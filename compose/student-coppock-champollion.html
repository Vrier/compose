<title>COMPOSE — Student · Coppock & Champollion</title>
<script>
  /* ---- Build identity -------------------------------------------------
     COMPOSE ships in four flavours that differ ONLY in this block:
       role:    'instructor' | 'student'
       preload: 'cc'  (Coppock & Champollion chapters baked in)
                'none' (nothing baked in; teacher gets a sample, student loads)
     The four build files (teacher*.html / student*.html) override
     window.COMPOSE_BUILD before this script. index.html is the dev build
     (full teacher + C&C). A student EXPORT sets window.COMPOSE_CONFIG instead
     (role:'student' + assignment) and leaves COMPOSE_BUILD at its default. */
  window.COMPOSE_BUILD = window.COMPOSE_BUILD || {
    id: 'student-cc', role: 'student', preload: 'cc',
    label: 'COMPOSE · Student + Coppock & Champollion', version: '1.0', date: '2026'
  };
  window.COMPOSE_CONFIG = window.COMPOSE_CONFIG ||
    { role: (window.COMPOSE_BUILD && window.COMPOSE_BUILD.role) || 'instructor', assignment: null };
</script>
