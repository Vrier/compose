<style>
/* ===========================================================================
   COMPOSE — visual system
   Three directions share one structural skeleton; only tokens change.
     [data-theme="parchment"]  warm paper, terracotta ink   (default)
     [data-theme="studio"]     bright warm-neutral, teal, card depth
     [data-theme="twilight"]   warm dark espresso, amber glow
   ========================================================================= */

/* ---- tokens ------------------------------------------------------------ */
:root[data-theme="parchment"] {
  --bg:        oklch(0.961 0.013 78);
  --bg-grain:  oklch(0.945 0.016 76);
  --panel:     oklch(0.985 0.008 82);
  --panel-2:   oklch(0.972 0.011 80);
  --ink:       oklch(0.285 0.022 52);
  --ink-soft:  oklch(0.42 0.02 55);
  --muted:     oklch(0.56 0.018 58);
  --faint:     oklch(0.69 0.014 62);
  --line:      oklch(0.875 0.016 72);
  --line-soft: oklch(0.915 0.012 74);
  --accent:    oklch(0.585 0.13 44);
  --accent-ink:oklch(0.46 0.13 42);
  --accent-soft:oklch(0.93 0.05 56);
  --good:      oklch(0.55 0.1 150);
  --good-soft: oklch(0.93 0.05 152);
  --bad:       oklch(0.55 0.16 26);
  --bad-soft:  oklch(0.94 0.05 30);
  --select:    oklch(0.62 0.11 250);
  --select-soft:oklch(0.93 0.045 250);
  --shadow:    0 1px 2px oklch(0.4 0.03 60 / 0.08), 0 8px 24px oklch(0.4 0.03 60 / 0.07);
  --shadow-sm: 0 1px 2px oklch(0.4 0.03 60 / 0.1);
  --radius: 10px;
}
:root[data-theme="studio"] {
  --bg:        oklch(0.975 0.006 130);
  --bg-grain:  oklch(0.968 0.007 130);
  --panel:     oklch(0.998 0.002 130);
  --panel-2:   oklch(0.982 0.005 150);
  --ink:       oklch(0.27 0.018 235);
  --ink-soft:  oklch(0.4 0.016 235);
  --muted:     oklch(0.54 0.014 230);
  --faint:     oklch(0.68 0.012 220);
  --line:      oklch(0.9 0.01 210);
  --line-soft: oklch(0.94 0.007 200);
  --accent:    oklch(0.58 0.095 205);
  --accent-ink:oklch(0.47 0.1 210);
  --accent-soft:oklch(0.94 0.035 200);
  --good:      oklch(0.58 0.1 160);
  --good-soft: oklch(0.94 0.04 165);
  --bad:       oklch(0.57 0.15 25);
  --bad-soft:  oklch(0.95 0.04 30);
  --select:    oklch(0.6 0.12 270);
  --select-soft:oklch(0.95 0.04 270);
  --shadow:    0 1px 2px oklch(0.5 0.02 230 / 0.06), 0 12px 30px oklch(0.5 0.04 230 / 0.1);
  --shadow-sm: 0 1px 3px oklch(0.5 0.02 230 / 0.1);
  --radius: 14px;
}
:root[data-theme="twilight"] {
  --bg:        oklch(0.225 0.016 58);
  --bg-grain:  oklch(0.245 0.018 58);
  --panel:     oklch(0.275 0.019 60);
  --panel-2:   oklch(0.305 0.02 62);
  --ink:       oklch(0.93 0.014 80);
  --ink-soft:  oklch(0.82 0.016 78);
  --muted:     oklch(0.68 0.018 72);
  --faint:     oklch(0.55 0.016 66);
  --line:      oklch(0.38 0.018 60);
  --line-soft: oklch(0.33 0.016 60);
  --accent:    oklch(0.76 0.13 68);
  --accent-ink:oklch(0.83 0.12 72);
  --accent-soft:oklch(0.34 0.05 62);
  --good:      oklch(0.74 0.12 162);
  --good-soft: oklch(0.34 0.05 162);
  --bad:       oklch(0.68 0.15 28);
  --bad-soft:  oklch(0.34 0.06 30);
  --select:    oklch(0.74 0.1 255);
  --select-soft:oklch(0.34 0.05 255);
  --shadow:    0 1px 2px oklch(0.12 0.02 60 / 0.4), 0 14px 34px oklch(0.1 0.02 60 / 0.45);
  --shadow-sm: 0 1px 3px oklch(0.12 0.02 60 / 0.4);
  --radius: 12px;
}

/* ---- base -------------------------------------------------------------- */
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Spectral', Georgia, serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}
.mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
::selection { background: var(--accent-soft); }

/* subtle paper grain via layered gradients */
.app-grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.6;
  background:
    radial-gradient(circle at 20% 18%, var(--bg-grain) 0, transparent 38%),
    radial-gradient(circle at 82% 72%, var(--bg-grain) 0, transparent 42%);
}

/* ---- app shell --------------------------------------------------------- */
#root { height: 100%; position: relative; z-index: 1; }
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100%;
}
.app-main {
  display: grid;
  grid-template-columns: 264px 1fr 300px;
  min-height: 0;
}
@media (max-width: 1180px) { .app-main { grid-template-columns: 232px 1fr 0; } .col-right { display: none !important; } }

/* ---- top bar ----------------------------------------------------------- */
.topbar {
  display: flex; align-items: center; gap: 18px;
  padding: 0 20px; height: 60px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in oklab, var(--panel) 88%, transparent);
  backdrop-filter: blur(6px);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-text { display: flex; flex-direction: column; line-height: 1.05; }
.brand .glyph {
  font-size: 30px; color: var(--accent); line-height: 1; font-weight: 500;
  font-family: 'Spectral', serif;
}
.brand .name { font-size: 19px; font-weight: 600; letter-spacing: 0.06em; }
.brand .sub { font-size: 10.5px; color: var(--muted); font-style: italic; letter-spacing: 0.005em; white-space: normal; line-height: 1.45; max-width: 200px; }
@media (max-width: 900px) { .brand .sub { display: none; } }
.topbar .file {
  margin-left: 6px; display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; border: 1px solid var(--line); border-radius: 999px;
  font-size: 13px; color: var(--ink-soft); background: var(--panel-2);
  cursor: pointer; transition: border-color .15s, background .15s; white-space: nowrap;
}
.topbar .file:hover { border-color: var(--accent); }
.topbar .file .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); }
.topbar .spacer { flex: 1; }
.score-pill {
  font-size: 13px; color: var(--ink-soft); padding: 6px 14px; white-space: nowrap;
  border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line-soft);
}
.score-pill b { color: var(--accent-ink); font-weight: 600; }

/* theme switcher */
.theme-switch { display: flex; gap: 4px; padding: 3px; background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 999px; }
.theme-switch button {
  border: 0; background: transparent; cursor: pointer; padding: 5px 12px;
  border-radius: 999px; font-family: inherit; font-size: 12.5px; color: var(--muted);
  display: flex; align-items: center; gap: 6px; transition: all .15s;
}
.theme-switch button .sw { width: 11px; height: 11px; border-radius: 50%; border: 1px solid oklch(0 0 0 / 0.12); }
.theme-switch button[aria-pressed="true"] { background: var(--panel); color: var(--ink); box-shadow: var(--shadow-sm); }

/* ---- panels / columns -------------------------------------------------- */
.col { min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
.col-left  { border-right: 1px solid var(--line); background: var(--panel); }
.col-right { border-left: 1px solid var(--line); background: var(--panel); }
.col-center { overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
.col-scroll { overflow-y: auto; min-height: 0; }
.col-scroll::-webkit-scrollbar { width: 9px; }
.col-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 9px; border: 2px solid var(--panel); }

.panel-head {
  display: flex; align-items: center; gap: 8px;
  padding: 16px 18px 8px; font-size: 11.5px; letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--muted); font-weight: 600;
}
.panel-head .count { margin-left: auto; font-size: 11px; color: var(--faint); letter-spacing: 0; }

/* ---- exercise navigator ------------------------------------------------ */
.nav-group { padding: 0 10px 6px; }
.nav-group-title {
  padding: 10px 8px 6px; font-size: 13px; color: var(--ink-soft);
  font-weight: 600; display: flex; align-items: center; gap: 7px;
}
.nav-group-title .kind {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--faint); font-weight: 600; margin-left: auto;
}
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 9px;
  border-radius: 8px; cursor: pointer; color: var(--ink-soft);
  font-size: 14px; transition: background .12s; position: relative;
}
.nav-item:hover { background: var(--panel-2); }
.nav-item.active { background: var(--accent-soft); color: var(--ink); }
.nav-item.active::before {
  content: ''; position: absolute; left: -10px; top: 7px; bottom: 7px; width: 3px;
  border-radius: 3px; background: var(--accent);
}
.nav-check {
  width: 19px; height: 19px; flex: 0 0 auto; border-radius: 50%;
  border: 1.5px solid var(--line); display: grid; place-items: center;
  font-size: 11px; color: transparent; transition: all .18s;
}
.nav-item.done .nav-check { background: var(--good); border-color: var(--good); color: white; }
.nav-item .gloss { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.nav-item .pts { font-size: 11px; color: var(--faint); }

/* ---- center stage ------------------------------------------------------ */
.stage { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.prob-head { padding: 22px 36px 6px; flex-shrink: 0; }
.prob-eyebrow { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-ink); font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.ref-link { font-size: 12px; letter-spacing: 0; text-transform: none; font-weight: 500; color: var(--muted); text-decoration: none; padding: 3px 9px; border: 1px solid var(--line); border-radius: 999px; transition: color .15s, border-color .15s, background .15s; white-space: nowrap; cursor: pointer; font-family: inherit; }
.ref-link:hover { color: var(--accent-ink); border-color: var(--accent); background: var(--accent-soft); }
.prob-title { font-size: 27px; font-weight: 600; letter-spacing: -0.015em; margin: 6px 0 0; }
.prob-title .q { color: var(--faint); font-weight: 400; }
/* scope target checkboxes */
.scope-targets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.scope-cb {
  display: flex; align-items: center; gap: 7px;
  background: var(--panel-2); border: 1.5px solid var(--line);
  border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px;
  color: var(--ink-soft); transition: border-color 0.15s, background 0.15s;
}
.scope-cb:hover { border-color: var(--accent); }
.scope-cb.active { border-color: var(--accent); background: var(--accent-soft); color: var(--ink); }
.scope-cb.done { border-color: var(--good); background: color-mix(in oklab, var(--good) 10%, transparent); color: var(--ink); }
.scope-cb-box { font-size: 15px; color: var(--accent-ink); }
.scope-cb.done .scope-cb-box { color: var(--good); }
.scope-cb-text { display: flex; flex-direction: column; gap: 1px; text-align: left; }
.scope-cb-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-family: inherit; }
.scope-cb-formula { font-size: 12px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; margin-top: 3px; line-height: 1.4; white-space: normal; }
.prob-targets { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
.prob-target-line {
  font-size: 12.5px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace;
  background: var(--panel-2); border-radius: 6px; padding: 3px 10px;
  display: inline-block; width: fit-content;
} 

.canvas {
  flex: 1; min-height: 0; position: relative; overflow: auto;
  display: grid; place-items: start center; padding: 24px;
}
.canvas-shell .canvas { cursor: grab; }
.canvas-shell .canvas.panning { cursor: grabbing; user-select: none; }
.canvas-shell .canvas.panning .tree-node { pointer-events: none; }
.canvas::-webkit-scrollbar { height: 9px; width: 9px; }
.canvas::-webkit-scrollbar-thumb { background: var(--line); border-radius: 9px; }

/* ---- canvas shell + zoom controls -------------------------------------- */
.canvas-shell { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; }
.tree-zoom { position: relative; }
.zoom-controls {
  position: absolute; top: 14px; right: 18px; z-index: 30;
  display: flex; align-items: stretch; gap: 0;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 9px; box-shadow: var(--shadow-sm); overflow: hidden;
}
.zoom-btn {
  border: 0; background: transparent; color: var(--ink); cursor: pointer;
  font-size: 17px; line-height: 1; padding: 7px 11px; min-width: 34px;
  font-family: inherit; transition: background .14s;
}
.zoom-btn + .zoom-btn { border-left: 1px solid var(--line); }
.zoom-btn:hover { background: var(--accent-soft); }
.zoom-btn.zoom-level { font-size: 12.5px; font-variant-numeric: tabular-nums; min-width: 50px; color: var(--muted); font-weight: 600; }
.zoom-btn.zoom-level:hover { color: var(--ink); }

/* ---- syntax tree ------------------------------------------------------- */
.tree-wrap { position: relative; }
.tree-svg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.tree-svg line { stroke: var(--line); stroke-width: 1.5; }
.tree-node {
  position: absolute; transform: translate(-50%, 0); z-index: 1;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  text-align: center;
}
.node-box {
  min-width: 46px; padding: 7px 13px; border-radius: 9px;
  border: 1.5px solid var(--line); background: var(--panel);
  cursor: pointer; transition: all .16s; position: relative; overflow: visible;
  box-shadow: var(--shadow-sm);
}
.node-box .node-label { font-size: 13px; color: var(--muted); font-style: italic; }
.node-box .node-word { font-size: 16px; font-weight: 500; }
.node-leaf .node-box { background: var(--panel-2); cursor: default; border-style: solid; }
.node-box.selectable:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.node-box.available { border-color: var(--accent); border-style: dashed; }
.node-box.available::after {
  content: ''; position: absolute; inset: -4px; border-radius: 12px;
  border: 1px solid var(--accent); opacity: 0.25; animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.12; } 50% { opacity: 0.4; } }
.node-box.selected { border-color: var(--select); background: var(--select-soft); box-shadow: 0 0 0 3px var(--select-soft); }
.node-box.done { border-color: var(--good); }
.node-locked .node-box { opacity: 0.9; }
/* PNG export: make boxes read solid & crisp (stronger borders, no fade) */
.tree-wrap.png-export .node-box {
  box-shadow: 0 1px 2px oklch(0.3 0.02 60 / 0.12);
  border-width: 1.5px;
  border-color: color-mix(in oklab, var(--ink) 34%, var(--line));
}
.tree-wrap.png-export .node-locked .node-box { opacity: 0.94; }
.tree-wrap.png-export .node-meaning,
.tree-wrap.png-export .node-leaf .node-box { border: 1px solid color-mix(in oklab, var(--ink) 18%, var(--line)); }
.node-meaning {
  font-size: 14.5px; padding: 3px 9px; border-radius: 7px;
  background: color-mix(in oklab, var(--good-soft) 60%, transparent);
  color: var(--ink); max-width: 280px; line-height: 1.35;
}
.node-meaning.pending { background: var(--panel-2); color: var(--muted); font-style: italic; }
.node-type-badge {
  font-size: 11px; color: var(--accent-ink); margin-top: 1px;
}
.node-rule-tag {
  position: absolute; top: -10px; right: -8px; font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.04em; background: var(--good); color: white;
  padding: 2px 6px; border-radius: 6px; box-shadow: var(--shadow-sm);
}

/* ---- expression cards (conversion / types) ----------------------------- */
.expr-stack { display: flex; flex-direction: column; gap: 0; align-items: stretch; max-width: 720px; width: 100%; }
.expr-line {
  display: flex; align-items: center; gap: 14px; padding: 14px 18px;
  border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel);
  box-shadow: var(--shadow-sm); font-size: 21px;
}
.expr-line.start { background: var(--panel-2); }
.expr-line .step-no { font-size: 11px; color: var(--faint); font-family: 'IBM Plex Mono', monospace; min-width: 26px; }
.expr-conn { width: 1.5px; height: 16px; background: var(--line); margin-left: 31px; }
.expr-arrow { color: var(--accent); font-size: 15px; margin-left: 24px; }
.types-q { font-size: 30px; text-align: center; }

/* ---- action dock ------------------------------------------------------- */
.dock {
  flex-shrink: 0;
  border-top: 1px solid var(--line); background: var(--panel);
  padding: 16px 36px 18px; display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 -8px 24px oklch(0.5 0.02 60 / 0.04);
}
.dock-label { font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.dock-hint { color: var(--muted); font-size: 14px; font-style: italic; }

.rule-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch; }
.rule-card {
  display: flex; flex-direction: column; gap: 2px; text-align: left;
  border: 1.5px solid var(--line); background: var(--panel-2); border-radius: 10px;
  padding: 10px 14px; cursor: pointer; transition: all .15s; min-width: 180px;
  font-family: inherit; color: var(--ink);
}
.rule-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }
.rule-card .rc-name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.rule-card .rc-mark { color: var(--bad); font-weight: 700; font-size: 14px; }
.rule-card .rc-mark:empty { display: none; }
.rule-card.rejected { border-color: var(--bad); background: var(--bad-soft); cursor: default; animation: shake .32s ease; }
.rule-card.rejected:hover { transform: none; box-shadow: none; border-color: var(--bad); }
.rule-card.rejected .rc-desc { color: color-mix(in oklab, var(--bad) 70%, var(--ink)); }
@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-4px); } 40% { transform: translateX(4px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
.rule-card .rc-abbr { font-size: 10px; font-weight: 700; color: var(--accent-ink); background: var(--accent-soft); padding: 1px 6px; border-radius: 5px; letter-spacing: 0.04em; }
.rule-card .rc-desc { font-size: 12.5px; color: var(--muted); line-height: 1.4; }

.compose-line {
  font-size: 21px; padding: 12px 16px; border-radius: 10px;
  background: var(--panel-2); border: 1px solid var(--line-soft);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.compose-line .lead { font-size: 13px; color: var(--muted); font-style: italic; }

/* input */
.entry-row { display: flex; gap: 10px; align-items: stretch; }
.entry {
  flex: 1; display: flex; align-items: center; gap: 10px;
  border: 1.5px solid var(--line); border-radius: 10px; background: var(--bg);
  padding: 0 14px; transition: border-color .15s, box-shadow .15s;
}
.entry:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.entry.ok { border-color: var(--good); box-shadow: 0 0 0 3px var(--good-soft); }
.entry.err { border-color: var(--bad); box-shadow: 0 0 0 3px var(--bad-soft); }
.entry input {
  flex: 1; border: 0; outline: 0; background: transparent; padding: 13px 0;
  font-family: 'IBM Plex Mono', monospace; font-size: 17px; color: var(--ink);
}
.entry .live {
  font-size: 18px; color: var(--ink-soft); min-width: 0; max-width: 45%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.7;
}
.btn {
  border: 0; cursor: pointer; font-family: inherit; font-size: 14.5px; font-weight: 600;
  padding: 0 20px; border-radius: 10px; transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: oklch(0.99 0.01 80); }
.btn-primary:hover { filter: brightness(1.06); box-shadow: var(--shadow); }
.btn-ghost { background: var(--panel-2); color: var(--ink-soft); border: 1px solid var(--line); padding: 9px 16px; }
.btn-ghost:hover { border-color: var(--accent); color: var(--ink); }
.btn:disabled { opacity: 0.45; cursor: default; }

/* symbol palette */
.palette { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.palette .grp { display: flex; gap: 4px; }
.palette .sep { width: 1px; height: 20px; background: var(--line); margin: 0 4px; }
.sym-key {
  font-family: 'Spectral', serif; font-size: 17px; min-width: 34px; height: 32px;
  border: 1px solid var(--line); background: var(--panel-2); border-radius: 8px;
  cursor: pointer; color: var(--ink); transition: all .12s; display: grid; place-items: center;
  position: relative;
}
.sym-key:hover { border-color: var(--accent); background: var(--accent-soft); }
.sym-key .hint { position: absolute; bottom: -2px; right: 2px; font-size: 8px; color: var(--faint); font-family: 'IBM Plex Mono', monospace; }
.palette-tip { font-size: 11px; color: var(--muted); padding: 2px 8px; border: 1px dashed var(--line); border-radius: 6px; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
kbd { font-family: var(--mono); font-size: 0.88em; background: var(--panel-2); border: 1px solid var(--line); border-bottom: 2px solid var(--line); border-radius: 3px; padding: 0px 4px; color: var(--ink); }

/* feedback */
.feedback { display: flex; align-items: flex-start; gap: 10px; font-size: 14.5px; padding: 11px 14px; border-radius: 10px; line-height: 1.45; }
.feedback.good { background: var(--good-soft); color: color-mix(in oklab, var(--good) 75%, var(--ink)); }
.feedback.bad { background: var(--bad-soft); color: color-mix(in oklab, var(--bad) 78%, var(--ink)); }
.feedback.info { background: var(--panel-2); color: var(--ink-soft); }
.feedback .fi { font-size: 16px; line-height: 1.3; }

/* ---- lexicon (right) --------------------------------------------------- */
.lex-item { padding: 11px 18px; border-bottom: 1px solid var(--line-soft); }
.lex-word { font-size: 15px; font-weight: 600; display: flex; align-items: baseline; gap: 8px; }
.lex-word .lex-type { font-size: 11.5px; color: var(--accent-ink); font-weight: 500; margin-left: auto; }
.lex-den { font-size: 16px; margin-top: 3px; color: var(--ink-soft); }

.ref-row { padding: 6px 18px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; }
.ref-key { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--muted); }
.ref-key .g { font-size: 18px; color: var(--ink); width: 22px; text-align: center; }
.ref-key .k { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint); margin-left: auto; }

/* ---- lambda notation glyph styling ------------------------------------- */
.lx { font-size: calc(1em * var(--lx-scale, 1)); }
.lx-var, .lx-bv { font-style: italic; font-family: 'Spectral', serif; }
.lx-const { font-style: normal; }
.lx-binder { font-style: normal; }
.lx-dot { color: var(--faint); margin: 0 1px 0 0; }
.lx-op { padding: 0 0.32em; color: var(--ink-soft); }
.lx-neg { padding: 0 0.04em 0 0; }
.lx-paren, .lx-comma { color: var(--faint); }
/* H&K partial-function definedness (presupposition : assertion) */
.lx-colon { color: var(--accent-ink, var(--ink-soft)); padding: 0 0.34em; font-weight: 600; }
.lx-presup { color: var(--ink-soft); }
.ty-atom { font-style: italic; }
.ty-var { font-style: italic; color: var(--accent-ink); }
.ty-ang, .ty-comma { color: var(--faint); }
.ty-prod { color: var(--faint); padding: 0 0.1em; }

/* ---- Quantifier Raising drag/drop ---------------------------------------- */
.qr-handle {
  position: absolute; bottom: -9px; right: -9px; width: 20px; height: 20px;
  background: oklch(0.55 0.15 255); color: white; border-radius: 5px;
  font-size: 13px; display: grid; place-items: center; cursor: grab; z-index: 3;
  border: none; line-height: 1; box-shadow: var(--shadow-sm);
}
.qr-handle:hover { filter: brightness(1.15); transform: scale(1.1); }
.qr-handle:active { cursor: grabbing; }
.qr-branch-hint {
  position: absolute; transform: translate(-50%, -100%);
  background: oklch(0.94 0.04 255); border: 1.5px dashed oklch(0.65 0.10 255);
  color: oklch(0.55 0.15 255); border-radius: 7px; padding: 3px 10px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
  white-space: nowrap; pointer-events: none; z-index: 4;
  opacity: 0.45; transition: all .15s;
}
.qr-branch-hint.dragging { opacity: 0.7; border-color: oklch(0.55 0.15 255); }
.qr-branch-hint.active {
  opacity: 1; background: oklch(0.55 0.15 255); color: white;
  border-style: solid; box-shadow: 0 0 0 3px oklch(0.55 0.15 255 / 0.25);
}
  position: absolute; height: 22px; border: 2px dashed oklch(0.55 0.15 255);
  border-radius: 8px; background: oklch(0.93 0.05 255 / 0.55);
  display: grid; place-items: center; font-size: 11px; font-weight: 700;
  color: oklch(0.55 0.15 255); pointer-events: none; z-index: 8; letter-spacing: 0.04em;
  transition: all .15s;
}
.qr-dropzone.active {
  background: oklch(0.55 0.15 255); color: white;
  box-shadow: 0 0 0 3px oklch(0.55 0.15 255 / 0.3);
}
.qr-ghost {
  position: fixed; z-index: 200; pointer-events: none;
  background: oklch(0.55 0.15 255); color: white; padding: 5px 13px;
  border-radius: 8px; font-size: 14px; font-weight: 600; font-family: 'Spectral', serif;
  box-shadow: 0 4px 16px oklch(0.3 0.08 255 / 0.35); opacity: 0.93;
  transform: translate(-50%, -115%); white-space: nowrap;
}
.node-label.qr-trace-preview {
  color: oklch(0.55 0.15 255); font-style: italic; opacity: 0.7;
}
.node-word.qr-index {
  font-weight: 800; font-size: 1.1em;
  color: oklch(0.4 0.13 255);
  opacity: 1 !important;
}
/* ---- type-shift ⇑ above-node box (C&C style) ----------------------------- */
.shift-above-box {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  z-index: 6; white-space: nowrap; pointer-events: none;
  width: max-content;
}

}

.shift-uparrow {

}
.shift-op-name {

}

}

.node-type-base { opacity: 0.55; }
.redex { background: var(--select-soft); border-radius: 4px; padding: 0 2px; box-shadow: 0 0 0 1px var(--select) inset; }

/* ---- file modal -------------------------------------------------------- */
.modal-backdrop { position: fixed; inset: 0; background: oklch(0.2 0.02 60 / 0.4); display: grid; place-items: center; z-index: 50; }
.modal { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); width: min(560px, 92vw); max-height: 84vh; overflow: hidden; display: flex; flex-direction: column; }

/* span label (words spanned) */
