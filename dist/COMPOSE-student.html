.fe-group-tools { display: flex; gap: 2px; flex-shrink: 0; }
.fe-gt-btn { width: 24px; height: 24px; border: 1px solid transparent; background: none; color: var(--muted); border-radius: 6px; cursor: pointer; font-size: 13px; line-height: 1; display: grid; place-items: center; }
.fe-gt-btn:hover:not(:disabled) { background: var(--panel-2); border-color: var(--line); color: var(--ink); }
.fe-gt-btn:disabled { opacity: 0.3; cursor: default; }
.fe-gt-del:hover:not(:disabled) { color: var(--bad); border-color: color-mix(in oklab, var(--bad) 40%, var(--line)); }

/* --- per-exercise expected answer + notes --- */
.fe-tree-meta { display: flex; flex-direction: column; gap: 4px; margin-top: 5px; }
.fe-exp-field { display: flex; align-items: center; gap: 6px; }
.fe-exp-label { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--faint); flex-shrink: 0; width: 54px; }
.fe-exp-input, .fe-note-input {
  flex: 1; min-width: 0; background: var(--panel-2); border: 1px solid var(--line-soft);
  border-radius: 6px; padding: 4px 8px; font-size: 12px; color: var(--ink-soft); outline: none;
}
.fe-exp-input:focus, .fe-note-input:focus { border-color: var(--accent); background: var(--panel); }
.fe-note-input { margin-left: 60px; }
.fe-exp-tick { color: var(--good); font-weight: 700; font-size: 13px; flex-shrink: 0; }
.fe-exp-diff { color: var(--warn, #b5762f); font-weight: 700; font-size: 13px; flex-shrink: 0; }

/* --- symbol palette bar in the editor --- */
.fe-palette-bar { padding: 7px 24px; border-top: 1px solid var(--line-soft); background: var(--panel-2); overflow-x: auto; }
.fe-palette-bar .palette { gap: 6px; }
.fe-palette-bar .palette-tip { display: none; }
.fe-palette-bar .sym-key { height: 30px; min-width: 30px; font-size: 15px; }
.fe-palette-bar .sym-key .hint { display: none; }
.fe-type-err { color: var(--bad); font-size: 14px; font-weight: 700; }
.fe-del-btn {
  background: none; border: none; cursor: pointer; color: var(--faint); font-size: 16px;
  padding: 2px; border-radius: 4px; line-height: 1;
}
.fe-del-btn:hover { color: var(--bad); background: color-mix(in oklab, var(--bad) 10%, transparent); }
.fe-lex-hint { font-size: 12px; color: var(--faint); line-height: 1.5; margin-top: 4px; }
.fe-lex-hint code { background: var(--panel-2); padding: 1px 4px; border-radius: 3px; font-size: 11.5px; }

/* Exercises panel */
.fe-ex-panel {
  padding: 16px 18px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.fe-groups { display: flex; flex-direction: column; gap: 14px; }
.fe-group {
  border: 1.5px solid var(--line-soft); border-radius: 11px; overflow: hidden;
  background: var(--panel-2);
}
.fe-group-hdr {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: var(--panel); border-bottom: 1px solid var(--line-soft);
}
.fe-group-title {
  flex: 1; background: none; border: none; outline: none; font-size: 14px; font-weight: 600;
  color: var(--ink); font-family: inherit;
}
.fe-group-title::placeholder { color: var(--faint); font-weight: 400; }
.fe-group-dir {
  width: 100%; background: var(--bg); border: none; border-bottom: 1px solid var(--line-soft);
  padding: 8px 14px; font-size: 13px; color: var(--ink-soft); resize: none; outline: none; font-family: inherit;
}
.fe-trees { display: flex; flex-direction: column; gap: 0; }
.fe-tree-item { padding: 10px 14px; border-bottom: 1px solid var(--line-soft); }
.fe-tree-item:last-child { border-bottom: none; }
.fe-tree-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.fe-tree-inst {
  flex: 1; background: none; border: none; outline: none; font-size: 13px;
  color: var(--ink-soft); font-family: inherit;
}
.fe-tree-inst::placeholder { color: var(--faint); }
.fe-tree-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.fe-tree-ok { font-size: 11px; color: var(--good-ink || var(--good)); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fe-tree-note { font-size: 11px; color: var(--muted); }
.fe-test-btn {
  background: none; border: 1.5px solid var(--line); border-radius: 6px; padding: 2px 9px;
  font-size: 12px; cursor: pointer; color: var(--accent-ink);
}
.fe-test-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
.fe-test-btn:disabled { opacity: 0.35; cursor: default; }
.fe-tree-input {
  width: 100%; background: var(--panel); border: 1.5px solid var(--line); border-radius: 8px;
  padding: 8px 10px; font-size: 13px; color: var(--ink); resize: vertical; outline: none;
  font-family: 'IBM Plex Mono', monospace;
}
.fe-tree-input:focus { border-color: var(--accent); }
.fe-add-tree-btn {
  display: block; width: 100%; padding: 8px; background: none; border: none; border-top: 1px solid var(--line-soft);
  cursor: pointer; font-size: 13px; color: var(--accent-ink); text-align: center;
}
.fe-add-tree-btn:hover { background: var(--accent-soft); }

/* Footer */
.fe-footer {
  display: flex; align-items: center; gap: 10px; padding: 12px 20px;
  border-top: 1px solid var(--line-soft); flex-shrink: 0; background: var(--panel-2);
}
.fe-footer-hint { font-size: 12px; color: var(--faint); }
.editor-head { display: flex; align-items: flex-start; gap: 12px; padding: 20px 24px 14px; border-bottom: 1px solid var(--line-soft); }
.editor-head h3 { margin: 0; font-size: 20px; font-weight: 600; }
.editor-head .sub { padding: 0; margin-top: 3px; color: var(--muted); font-size: 13.5px; max-width: 64ch; }
.icon-btn { margin-left: auto; border: 1px solid var(--line); background: var(--panel-2); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; color: var(--ink-soft); font-size: 13px; flex: 0 0 auto; }
.icon-btn:hover { border-color: var(--accent); }
.editor-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; overflow: hidden; min-height: 0; }
.editor-col { padding: 18px 24px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
.editor-preview { background: var(--panel-2); border-left: 1px solid var(--line-soft); }
.ed-label { font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-top: 10px; display: flex; align-items: baseline; gap: 8px; }
.ed-label:first-child { margin-top: 0; }
.ed-hint { text-transform: none; letter-spacing: 0; font-weight: 400; font-style: italic; color: var(--faint); font-size: 12px; }
.ed-area { border: 1.5px solid var(--line); border-radius: 10px; background: var(--bg); color: var(--ink); padding: 11px 13px; font-size: 14.5px; line-height: 1.6; resize: vertical; outline: none; transition: border-color .15s, box-shadow .15s; }
.ed-area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.ed-lex-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 6px; }
.ed-lex-item { display: flex; align-items: baseline; gap: 10px; padding: 7px 10px; border-radius: 8px; background: var(--panel); border: 1px solid var(--line-soft); }
.ed-lex-item.err { border-color: var(--bad); background: var(--bad-soft); }
.ed-lex-word { font-weight: 600; font-size: 14px; min-width: 64px; }
.ed-lex-den { font-size: 16px; flex: 1; }
.ed-lex-type { font-size: 12px; color: var(--accent-ink); margin-left: auto; }
.ed-lex-err { font-size: 12.5px; color: var(--bad); flex: 1; }
.ed-empty { color: var(--muted); font-style: italic; font-size: 13.5px; padding: 8px 2px; }
.ed-empty code, .ed-foot-note code { font-family: 'IBM Plex Mono', monospace; background: var(--panel); padding: 1px 5px; border-radius: 5px; font-size: 0.9em; font-style: normal; }
.ed-check { min-height: 60px; }
.ed-result { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 12px 14px; border-radius: 10px; font-size: 17px; }
.ed-result.good { background: var(--good-soft); }
.ed-result.bad { background: var(--bad-soft); color: color-mix(in oklab, var(--bad) 78%, var(--ink)); font-size: 14px; }
.ed-result.note { background: var(--panel-2); color: var(--ink-soft); font-size: 13.5px; border: 1px solid var(--line-soft); }
.ed-result.note .ed-result-tag { background: var(--muted); color: var(--panel); }
.ed-result-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; background: var(--good); color: white; }
.ed-result.bad .ed-result-tag { background: var(--bad); }
.editor-foot { display: flex; align-items: center; gap: 10px; padding: 14px 24px; border-top: 1px solid var(--line-soft); }
.ed-foot-note { font-size: 12px; color: var(--muted); }
@media (max-width: 760px) { .editor-body { grid-template-columns: 1fr; } }

/* ---- type-shift affordances ------------------------------------------- */
.shift-inline { display: inline-block; color: var(--select); font-weight: 700; }
.node-box.shiftable { border-style: solid; }
.node-box.shiftable::before {
  content: ''; position: absolute; inset: -3px; border-radius: 11px;
  border: 1.5px dashed var(--select); opacity: 0.5; pointer-events: none;
}
.node-box.shifted { border-color: var(--select); background: var(--select-soft); }
.shift-dot {
  position: absolute; top: -9px; left: -9px; width: 19px; height: 19px;
  background: var(--select); color: white; border-radius: 50%; font-size: 12px;
  display: grid; place-items: center; box-shadow: var(--shadow-sm); z-index: 2;
}
.node-rule-tag.shift-tag { background: var(--select); }
.rule-card.shift-card { border-color: color-mix(in oklab, var(--select) 40%, var(--line)); }
.rule-card.shift-card:hover { border-color: var(--select); }
.rc-abbr.shift-abbr { background: var(--select-soft); color: var(--select); font-family: 'Spectral', serif; font-style: normal; letter-spacing: 0; }
.dock-sub { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--faint); margin-left: 8px; font-size: 12px; }
.dock-sub .ty { font-size: 13px; }

/* ---- rules options modal ---------------------------------------------- */
.rules-modal { width: min(560px, 94vw); max-height: 88vh; display: flex; flex-direction: column; }
.rules-body { overflow-y: auto; padding: 4px 20px 8px; }
.rules-sec-label { font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin: 16px 4px 8px; display: flex; align-items: center; gap: 8px; }
.ro-count { margin-left: auto; font-size: 11px; color: var(--accent-ink); background: var(--accent-soft); padding: 1px 8px; border-radius: 999px; letter-spacing: 0; text-transform: none; }
.ro-selall {
  margin-left: 8px; font-size: 11px; padding: 2px 9px; border-radius: 999px;
  border: 1px solid var(--line); background: var(--panel); cursor: pointer; font-family: inherit;
  color: var(--ink-soft); transition: border-color .15s, color .15s;
}
.bundle-load-hint { font-size: 11.5px; color: var(--muted); padding: 8px 14px; text-align: center; }
.export-lock-note {
  display: flex; align-items: flex-start; gap: 7px;
  font-size: 12px; line-height: 1.45; color: var(--accent-ink);
  background: var(--accent-soft); border: 1px solid color-mix(in oklab, var(--accent) 35%, transparent);
  border-radius: 9px; padding: 9px 12px; margin-top: 10px;
}

/* ---- Export modal (matches editor shell style) -------------------------- */
.export-shell {
  width: min(900px, 96vw); height: min(680px, 90vh);
  display: flex; flex-direction: column;
  background: var(--panel); border-radius: 14px;
  box-shadow: 0 24px 64px rgba(0,0,0,.22); overflow: hidden;
}
.export-columns {
  display: flex; flex: 1; min-height: 0;
}
.export-picker {
  width: 55%; border-right: 1px solid var(--line);
  display: flex; flex-direction: column; overflow: hidden;
}
.export-picker-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px; border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.export-count-badge {
  font-size: 12px; color: var(--accent); font-weight: 600;
  background: var(--accent-soft); padding: 2px 10px; border-radius: 20px;
}
.export-picker-scroll {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.export-ch-group { border-bottom: 1px solid var(--line); }
.export-ch-head {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 18px; cursor: pointer; user-select: none;
  font-size: 12.5px; font-weight: 600; color: var(--ink);
}
.export-ch-head:hover { background: var(--hover); }
.export-ch-arrow { font-size: 10px; color: var(--muted); width: 12px; flex-shrink: 0; }
.export-ch-label { flex: 1; }
.export-ch-all {
  font-size: 13px; width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid var(--line); background: var(--panel-2);
  color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; padding: 0;
}
.export-ch-count { font-size: 11px; color: var(--muted); min-width: 28px; text-align: right; }
.export-item {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 18px 5px 32px; cursor: pointer;
  font-size: 13px; color: var(--ink);
}
.export-item:hover { background: var(--hover); }
.export-item.on { color: var(--accent); }
.export-item-check {
  width: 16px; height: 16px; border: 1.5px solid var(--line); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; flex-shrink: 0; color: var(--ink); background: var(--panel-2);
}
.export-item.on .export-item-check {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.export-item-title { flex: 1; }
.export-item-count { font-size: 11px; color: var(--muted); }
.export-summary {
  flex: 1; display: flex; flex-direction: column; padding: 18px;
  overflow-y: auto; background: var(--panel-2);
}
.export-summary-title {
  font-size: 18px; font-weight: 600; color: var(--ink); margin: 8px 0 14px;
  font-family: var(--serif); line-height: 1.3;
}
.export-empty-hint {
  font-size: 13px; color: var(--muted); line-height: 1.6;
  margin-top: 16px;
}
.export-summary-list { flex: 1; overflow-y: auto; }
.export-summary-row {
  display: flex; align-items: baseline; gap: 6px;
  padding: 4px 0; font-size: 13px; color: var(--ink);
  border-bottom: 1px solid var(--line-soft);
}
.export-summary-dot { color: var(--accent); flex-shrink: 0; }
.export-summary-name { flex: 1; }
.export-summary-n { font-size: 11px; color: var(--muted); }
.export-summary-footer {
  margin-top: auto; padding-top: 14px; display: flex; flex-direction: column; gap: 8px;
}
.export-summary-meta { font-size: 12px; color: var(--muted); }
.export-err { font-size: 12.5px; color: var(--bad); background: var(--bad-soft); padding: 8px 12px; border-radius: 6px; }
.export-status-msg { font-size: 12.5px; color: var(--accent); }
.export-btn { width: 100%; padding: 11px; font-size: 14px; justify-content: center; border-radius: 8px; }
.export-spinner { display: inline-block; animation: spin 1s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.fe-placeholder { color: var(--muted); font-style: italic; font-weight: 400; font-size: 14px; }

/* ---- Dark mode overlay ------------------------------------------------- */
/* Parchment dark: warm slate */
:root[data-theme="parchment"][data-dark="true"] {
  --bg:        oklch(0.15 0.014 52);
  --bg-grain:  oklch(0.17 0.016 50);
  --panel:     oklch(0.20 0.015 54);
  --panel-2:   oklch(0.23 0.014 52);
  --ink:       oklch(0.93 0.010 72);
  --ink-soft:  oklch(0.78 0.012 65);
  --muted:     oklch(0.60 0.012 60);
  --faint:     oklch(0.42 0.010 56);
  --line:      oklch(0.32 0.016 54);
  --line-soft: oklch(0.27 0.012 52);
  --hover:     oklch(1 0 0 / 0.05);
  --select:         oklch(0.74 0.12 168);
  --select-soft:    oklch(0.74 0.12 168 / 0.15);
  --good:           oklch(0.72 0.16 152);
  --bad:            oklch(0.72 0.18 22);
}
/* Studio dark: cool slate, teal accents */
:root[data-theme="studio"][data-dark="true"] {
  --bg:        oklch(0.15 0.010 220);
  --bg-grain:  oklch(0.17 0.012 218);
  --panel:     oklch(0.20 0.014 222);
  --panel-2:   oklch(0.23 0.016 220);
  --ink:       oklch(0.93 0.008 230);
  --ink-soft:  oklch(0.77 0.012 225);
  --muted:     oklch(0.58 0.014 220);
  --faint:     oklch(0.40 0.012 215);
  --line:      oklch(0.30 0.018 218);
  --line-soft: oklch(0.25 0.014 220);
  --hover:     oklch(1 0 0 / 0.05);
  --accent:         oklch(0.74 0.13 200);
  --accent-ink:     oklch(0.74 0.13 200);
  --accent-soft:    oklch(0.74 0.13 200 / 0.15);
  --select:         oklch(0.74 0.12 168);
  --select-soft:    oklch(0.74 0.12 168 / 0.15);
  --good:           oklch(0.72 0.16 152);
  --bad:            oklch(0.72 0.18 22);
}

/* ---- Settings menu ----------------------------------------------------- */
.settings-menu { position: relative; }
.settings-details { position: relative; }
.settings-details summary { list-style: none; cursor: pointer; }
.settings-details summary::-webkit-details-marker { display: none; }
.settings-details[open] > summary { background: var(--accent-soft) !important; color: var(--accent-ink) !important; border-color: var(--accent) !important; }
.settings-dropdown {
  position: absolute; top: calc(100% + 6px); right: 0; z-index: 9999;
  background: var(--panel); border: 1.5px solid var(--line);
  border-radius: 12px; padding: 12px 16px; box-shadow: 0 8px 32px oklch(0 0 0 / 0.18);
  min-width: 200px;
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  cursor: pointer;
}
.settings-label { font-size: 14px; color: var(--ink); font-weight: 500; }
/* ---- Tools menu (authoring) -------------------------------------------- */
.tools-dropdown { display: flex; flex-direction: column; gap: 8px; min-width: 250px; padding: 12px; }
.tool-btn {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  width: 100%; box-sizing: border-box;
  font: inherit; font-size: 14px; font-weight: 500; color: var(--ink);
  background: var(--surface, transparent); border: 1.5px solid var(--line);
  border-radius: 9px; padding: 9px 14px; cursor: pointer;
  text-align: left; transition: background .15s, border-color .15s, color .15s;
}
.tool-btn > span:first-child { white-space: nowrap; }
.tool-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-ink); }
.tool-btn:disabled { opacity: 0.5; cursor: default; }
.tool-btn:disabled:hover { background: var(--surface, transparent); border-color: var(--line); color: var(--ink); }
.tool-ico { font-size: 14px; opacity: 0.7; flex-shrink: 0; }
.tool-btn:hover .tool-ico { opacity: 1; }
.tools-sep { height: 1px; background: var(--line-soft); margin: 3px 2px; }
/* slim files-modal footer + drag-drop affordance */
.files-foot-slim {
  display: flex; align-items: center; gap: 10px; margin: 14px 22px 20px;
  padding: 11px 14px; border: 1.5px dashed var(--line); border-radius: 11px;
  background: var(--panel-2); font-size: 12.5px; color: var(--muted); line-height: 1.45;
}
.files-foot-slim.err { border-color: var(--bad); background: var(--bad-soft); }
.files-foot-slim .ffs-icon { font-size: 16px; color: var(--accent); flex-shrink: 0; }
.files-foot-slim b { color: var(--ink-soft); font-weight: 600; }
.files-foot-slim .ffs-err { color: var(--bad); }
.modal.modal-drop-over { outline: 2px dashed var(--accent); outline-offset: -6px; }
.modal.modal-drop-over .files-foot-slim { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }
.ffs-load-btn {
  font: inherit; font-size: inherit; font-weight: 700; cursor: pointer;
  color: var(--accent-ink); background: none; border: 0; padding: 0;
  text-decoration: underline; text-underline-offset: 2px;
}
.ffs-load-btn:hover { color: var(--accent); }
/* ---- build/identity stamp (settings dropdown) ------------------------- */
.settings-stamp {
  margin-top: 6px; padding: 9px 4px 2px; border-top: 1px solid var(--line-soft);
  font-size: 11px; letter-spacing: 0.02em; color: var(--faint); text-align: center;
}
/* ---- teacher answer-key button ---------------------------------------- */
.reveal-soln-btn { color: var(--accent-ink); border-color: color-mix(in oklab, var(--accent) 32%, var(--line)); }
.reveal-soln-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
/* ---- empty stage (no problem set loaded) ------------------------------ */
.empty-stage { display: grid; place-items: center; height: 100%; padding: 40px; }
.empty-stage-card {
  max-width: 440px; text-align: center; display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.empty-stage-glyph {
  font-family: Georgia, 'Spectral', serif; font-size: 64px; line-height: 1;
  color: var(--accent); opacity: 0.85; margin-bottom: 10px;
}
.empty-stage-card h2 { font-size: 22px; font-weight: 600; color: var(--ink); margin: 0; }
.empty-stage-card p { font-size: 14.5px; line-height: 1.55; color: var(--muted); margin: 6px 0 4px; }
.empty-stage-actions { display: flex; gap: 10px; margin-top: 14px; }
.empty-stage-hint { font-size: 12px; color: var(--faint); margin-top: 14px; }
/* ---- Chapter folder nav ------------------------------------------------ */
.ch-folder { border-bottom: 1px solid var(--line-soft); }
.ch-folder-head { list-style: none; display: flex; align-items: baseline; gap: 6px; padding: 7px 14px 7px 12px; cursor: pointer; user-select: none; font-size: 13px; color: var(--muted); }
.ch-folder-head::-webkit-details-marker { display: none; }
.ch-folder-head::before { content: '▸'; font-size: 10px; flex-shrink: 0; transition: transform .15s; }
details[open] > .ch-folder-head::before { transform: rotate(90deg); }
.ch-folder-head.active { color: var(--accent-ink); }
.ch-label { font-weight: 700; color: var(--ink-soft); font-size: 12px; min-width: 26px; }
.ch-title { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-count { font-size: 11px; color: var(--faint); flex-shrink: 0; }
.ch-set { border-left: 2px solid var(--line-soft); margin-left: 14px; }
.ch-set-active { border-left-color: var(--accent); }
.ch-set-head { padding: 5px 10px; cursor: pointer; font-size: 12px; color: var(--muted); font-weight: 500; }
.ch-set-head:hover { color: var(--ink); }
.ch-set-active .ch-set-head { color: var(--accent-ink); font-weight: 600; }
.prob-head-row { display: flex; align-items: baseline; gap: 12px; }
.prob-head-row h2 { flex: 1; }
.reset-deriv-btn { font-size: 12px; padding: 3px 10px; flex-shrink: 0; opacity: 0.7; }
.reset-deriv-btn:hover { opacity: 1; }
.tc-toggle { font-size: 12px; padding: 3px 10px; flex-shrink: 0; opacity: 0.6; }
.tc-toggle:hover { opacity: 1; }
.tc-toggle.on { opacity: 1; color: var(--accent-ink); background: var(--accent-soft); border-color: var(--accent); }
/* chapter groups in file picker */
.fc-chapter { margin-bottom: 2px; border-bottom: 1px solid var(--line-soft); }
.fc-chapter-head { list-style: none; display: flex; align-items: center; gap: 6px; padding: 9px 16px; cursor: pointer; user-select: none; font-size: 12px; font-weight: 600; color: var(--ink-soft); }
.fc-chapter-head::-webkit-details-marker { display: none; }
.fc-chapter-head::before { content: '▸'; font-size: 10px; color: var(--muted); flex-shrink: 0; transition: transform .15s; }
details[open] > .fc-chapter-head::before { transform: rotate(90deg); }
.fc-ch-label { font-weight: 700; color: var(--accent-ink); min-width: 26px; font-size: 12px; }
.fc-ch-count { margin-left: auto; font-size: 11px; color: var(--faint); font-weight: 400; }
.fc-indent { margin-left: 12px; border-left: 2px solid var(--line-soft); border-radius: 0 8px 8px 0; margin-bottom: 2px; }
.fc-active { background: var(--accent-soft) !important; border-left-color: var(--accent) !important; }

.reset-all-btn {
  display: block; width: calc(100% - 16px); margin: 0 8px;
  font-size: 12px; padding: 7px; text-align: center;
  border-radius: 7px; opacity: 0.6;
}
.reset-all-btn:hover { opacity: 1; background: var(--hover); }

.teacher-nav-btn { font-weight: 600 !important; }
.teacher-nav-btn.on { color: var(--accent-ink) !important; background: var(--accent-soft) !important; border-color: var(--accent) !important; }

/* rules read-only state */
.rules-readonly { pointer-events: none; opacity: 0.7; }
.rules-readonly-banner {
  margin: 0 24px 8px; padding: 8px 14px; background: var(--accent-soft);
  border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
  border-radius: 8px; font-size: 13px; color: var(--accent-ink);
}

/* student read-only list view */
.rules-student-view {
  padding: 8px 24px 16px; display: flex; flex-direction: column; gap: 10px;
  overflow-y: auto;
}
.rsv-section-head {
  font-size: 10.5px; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--muted); font-weight: 700; margin: 4px 0 2px;
}
.rsv-rule-card, .rsv-shift-card {
  border: 1.5px solid var(--line-soft); border-radius: 10px;
  padding: 12px 14px; background: var(--panel-2);
  display: flex; flex-direction: column; gap: 5px;
}
.rsv-shift-card { padding: 9px 14px; }
.rsv-rule-hdr { display: flex; align-items: center; gap: 9px; }
.rsv-abbr {
  font-size: 10px; font-weight: 800; letter-spacing: 0.06em;
  background: var(--good); color: white; padding: 2px 7px;
  border-radius: 5px; flex-shrink: 0;
}
.rsv-abbr-shift { background: var(--select); }
.rsv-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.rsv-rule-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }
.rsv-rule-when { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
.rsv-when-label { font-weight: 600; color: var(--accent-ink); }
.rule-opt { display: flex; align-items: flex-start; gap: 11px; padding: 10px 12px; border-radius: 10px; cursor: pointer; border: 1px solid var(--line-soft); margin-bottom: 6px; transition: background .12s, border-color .12s; }
.rule-opt:hover { background: var(--panel-2); }
.rule-opt.on { border-color: color-mix(in oklab, var(--accent) 35%, var(--line)); background: color-mix(in oklab, var(--accent-soft) 35%, transparent); }
.rule-opt input { position: absolute; opacity: 0; pointer-events: none; }
.ro-box { flex: 0 0 auto; width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--line); margin-top: 1px; display: grid; place-items: center; transition: all .15s; }
.rule-opt.on .ro-box { background: var(--accent); border-color: var(--accent); }
.rule-opt.on .ro-box::after { content: '✓'; color: white; font-size: 13px; }
.ro-text { display: flex; flex-direction: column; gap: 2px; }
.ro-name { font-size: 14.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.ro-grp { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--faint); }
.ro-desc { font-size: 12.5px; color: var(--muted); line-height: 1.4; }
.rule-opt.compact { padding: 7px 10px; margin-bottom: 3px; }

/* ---- collapsible type-shift groups ------------------------------------ */
.shift-group { margin-bottom: 4px; }
.shift-group-hdr {
  display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 12px;
  background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 10px;
  cursor: pointer; font-family: inherit; color: var(--ink); font-size: 14px; font-weight: 600;
}
.shift-group-hdr:hover { border-color: var(--accent); }
.sg-name { flex: 1; text-align: left; }
.sg-count { font-size: 11px; color: var(--accent-ink); background: var(--accent-soft); padding: 1px 7px; border-radius: 999px; font-weight: 500; }
.sg-selall { margin-left: 6px; font-size: 11px !important; padding: 2px 8px !important; min-width: auto; }
.sg-arrow { font-size: 11px; color: var(--faint); width: 14px; text-align: center; margin-left: auto; }
.shift-group-items { padding: 4px 0 4px 12px; display: flex; flex-direction: column; gap: 2px; }

/* ---- mode toggle (Student ⟷ Teacher) ---------------------------------- */
.mode-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border: 1px solid var(--line); border-radius: 999px;
  background: var(--panel); cursor: pointer; font-size: 12px; font-family: inherit;
  color: var(--muted); transition: border-color .2s, background .2s;
  white-space: nowrap;
}
.mode-toggle:hover { border-color: var(--accent); }
.mode-toggle .mode-knob {
  display: inline-block; width: 28px; height: 16px; border-radius: 999px;
  background: var(--line); position: relative; flex-shrink: 0;
  transition: background .2s;
}
.mode-toggle .mode-knob::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--panel); transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.mode-toggle.teacher .mode-knob { background: var(--accent); }
.mode-toggle.teacher .mode-knob::after { transform: translateX(12px); }
.mode-toggle.student .mode-label:first-child { color: var(--ink); font-weight: 600; }
.mode-toggle.teacher .mode-label:last-child  { color: var(--accent-ink); font-weight: 600; } ---------------------------------------------------- */
.reset-small {
  font-size: 12px; padding: 4px 10px; border-radius: 7px; margin-left: 12px;
  vertical-align: middle; color: var(--muted);
}

/* ---- workspace behaviour toggles (Rules modal) ------------------------ */
.beh-label { margin-top: 20px; border-top: 1px solid var(--line-soft); padding-top: 14px; }
.beh-block { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
.beh-row { display: flex; align-items: center; gap: 16px; padding: 12px 14px; border-radius: 10px; background: color-mix(in oklab, var(--accent-soft) 30%, var(--panel-2)); border: 1px solid color-mix(in oklab, var(--accent) 20%, var(--line-soft)); }
.beh-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.beh-name { font-size: 14.5px; font-weight: 600; }
.beh-desc { font-size: 12.5px; color: var(--muted); line-height: 1.4; }
.beh-toggle {
  flex: 0 0 auto; width: 48px; height: 28px; border-radius: 999px; border: none; cursor: pointer;
  background: var(--line); position: relative; transition: background .2s; padding: 0;
}
.beh-toggle.on { background: var(--accent); }
.beh-knob {
  display: block; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%;
  background: white; box-shadow: var(--shadow-sm); transition: left .2s;
}
.beh-toggle.on .beh-knob { left: 23px; }

/* ---- predicate modification sisters display --------------------------- */
.pm-sisters { display: flex; align-items: center; gap: 10px; }
.pm-op { font-size: 20px; color: var(--accent-ink); font-family: 'Spectral', serif; padding: 0 2px; }

/* editor mode tabs */
.ed-tabs { display: flex; gap: 4px; margin-top: 8px; }
.ed-tab { border: 1px solid var(--line); background: var(--panel-2); color: var(--muted); font-family: inherit; font-size: 13px; padding: 5px 14px; border-radius: 999px; cursor: pointer; transition: all .14s; }
.ed-tab:hover { border-color: var(--accent); color: var(--ink); }
.ed-tab.on { background: var(--accent); border-color: var(--accent); color: oklch(0.99 0.01 80); }

/* guided builder */
.guided-stage { padding: 18px 24px 0; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.guided-stage .ed-area { width: 100%; }
.guided-meta { min-height: 26px; font-size: 13.5px; }
.guided-found { color: var(--ink-soft); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.word-chip { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; background: var(--accent-soft); color: var(--accent-ink); padding: 2px 9px; border-radius: 999px; }
.guided-tip { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
.guided-tip code, .files-foot code, .sub code { font-family: 'IBM Plex Mono', monospace; background: var(--panel-2); padding: 1px 5px; border-radius: 5px; font-size: 0.9em; }
.guided-words { display: flex; flex-direction: column; gap: 7px; margin-bottom: 4px; }
.gw-row { display: grid; grid-template-columns: minmax(90px, auto) auto 1fr minmax(70px, auto); align-items: center; gap: 10px; padding: 8px 12px; border: 1.5px solid var(--line); border-radius: 10px; background: var(--panel-2); transition: border-color .14s; }
.gw-row.ok { border-color: color-mix(in oklab, var(--good) 50%, var(--line)); }
.gw-row.err { border-color: var(--bad); }
.gw-word { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 7px; }
.gw-known { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent-ink); background: var(--accent-soft); padding: 2px 6px; border-radius: 5px; }
.gw-eq { font-size: 15px; color: var(--muted); font-style: italic; }
.gw-input { border: 1px solid var(--line); border-radius: 8px; background: var(--bg); color: var(--ink); padding: 9px 11px; font-size: 15px; outline: none; transition: border-color .14s, box-shadow .14s; }
.gw-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.gw-type { font-size: 12.5px; color: var(--accent-ink); text-align: right; }
.gw-err { color: var(--bad); font-size: 11.5px; }
.editor-foot.inset { padding: 14px 0 18px; border-top: 1px solid var(--line-soft); margin-top: 8px; }

/* file library footer: dropzone + create */
.files-foot { padding: 8px 22px 18px; display: flex; flex-direction: column; gap: 8px; }
.dropzone { display: flex; align-items: center; gap: 13px; padding: 14px 16px; border: 1.5px dashed var(--line); border-radius: 12px; background: var(--panel-2); cursor: pointer; transition: all .15s; }
.dropzone:hover, .dropzone.over { border-color: var(--accent); background: var(--accent-soft); }
.dropzone.err { border-color: var(--bad); background: var(--bad-soft); }
.dz-icon { font-size: 22px; color: var(--accent); width: 34px; height: 34px; display: grid; place-items: center; border-radius: 9px; background: var(--panel); }
.dz-title { font-weight: 600; }
.dz-sub { font-size: 12.5px; color: var(--muted); }
.dropzone.err .dz-sub { color: var(--bad); }
.make-card { width: 100%; text-align: left; border: 1px solid var(--line); background: var(--panel); font-family: inherit; color: var(--ink); border-radius: 12px; }
.fc-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--good); background: var(--good-soft); padding: 2px 6px; border-radius: 5px; margin-left: 8px; vertical-align: middle; }
.fc-remove { margin-left: auto; border: 1px solid var(--line); background: var(--panel-2); color: var(--muted); width: 26px; height: 26px; border-radius: 7px; cursor: pointer; font-size: 11px; flex: 0 0 auto; }
.fc-remove:hover { border-color: var(--bad); color: var(--bad); background: var(--bad-soft); }

/* ---- My-exercises manager (files modal) -------------------------------- */
.ue-chapter { border-top: 1px solid var(--line); }
.ue-head {
  display: flex; align-items: center; gap: 6px; padding: 10px 16px;
  font-size: 12px; font-weight: 600; color: var(--ink-soft);
}
.ue-head-actions { margin-left: auto; display: flex; gap: 6px; }
.ue-new-btn, .ue-clear-btn {
  font: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer;
  border-radius: 7px; padding: 4px 10px; border: 1px solid var(--line);
  background: var(--panel-2); color: var(--ink-soft); transition: all .14s;
}
.ue-new-btn:hover { border-color: var(--accent); color: var(--accent-ink); background: var(--accent-soft); }
.ue-clear-btn:hover { border-color: var(--bad); color: var(--bad); background: var(--bad-soft); }
.ue-empty { font-size: 12px; color: var(--muted); line-height: 1.5; padding: 4px 18px 12px; }
.ue-empty code { font-family: 'IBM Plex Mono', monospace; background: var(--panel-2); padding: 1px 5px; border-radius: 5px; font-size: 0.9em; }
.ue-group { margin-bottom: 2px; }
.ue-group-head {
  list-style: none; display: flex; align-items: center; gap: 7px;
  padding: 6px 16px 6px 22px; cursor: pointer; user-select: none;
  font-size: 12px; font-weight: 600; color: var(--ink-soft);
}
.ue-group-head::-webkit-details-marker { display: none; }
.ue-group-head::before { content: '▸'; font-size: 10px; color: var(--muted); transition: transform .15s; }
details[open] > .ue-group-head::before { transform: rotate(90deg); }
.ue-folder { font-size: 13px; }
.ue-item { display: flex; align-items: center; gap: 9px; padding: 10px 12px; min-width: 0; }
.ue-item .fc-meta { font-size: 11px; color: var(--muted); }
.ue-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.ue-group-sel {
  font: inherit; font-size: 11px; color: var(--ink-soft); background: var(--panel-2);
  border: 1px solid var(--line); border-radius: 7px; padding: 3px 4px; max-width: 92px; cursor: pointer;
}
.ue-group-sel:hover { border-color: var(--accent); }
.ue-btn {
  border: 1px solid var(--line); background: var(--panel-2); color: var(--muted);
  width: 26px; height: 26px; border-radius: 7px; cursor: pointer; font-size: 12px; flex-shrink: 0;
  transition: all .14s;
}
.ue-btn:hover { border-color: var(--accent); color: var(--accent-ink); background: var(--accent-soft); }
.ue-rename {
  font: inherit; font-size: 13.5px; font-weight: 500; width: 100%;
  border: 1.5px solid var(--accent); border-radius: 6px; padding: 3px 7px;
  background: var(--panel); color: var(--ink);
}
.ue-row { display: flex; flex-direction: column; }
.ue-exp-menu {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin: 0 12px 6px 24px; padding: 8px 10px;
  background: var(--accent-soft); border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
  border-radius: 9px;
}
.ue-exp-label { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent-ink); }
.ue-exp-opt {
  font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer;
  display: flex; align-items: baseline; gap: 6px;
  border: 1px solid var(--line); background: var(--panel); color: var(--ink);
  border-radius: 7px; padding: 5px 11px; transition: all .14s;
}
.ue-exp-opt:hover { border-color: var(--accent); color: var(--accent-ink); }
.ue-exp-ext { font-size: 10.5px; font-weight: 400; color: var(--muted); }

/* save-to-library button in editor header */
.fe-save-lib-btn { font-size: 13px !important; border-color: var(--accent) !important; color: var(--accent-ink) !important; }
.fe-save-lib-btn:hover:not(:disabled) { background: var(--accent-soft) !important; }
.fe-save-lib-btn.saved { color: var(--good) !important; border-color: var(--good) !important; background: var(--good-soft) !important; }

/* My-exercises group in the export picker */
.export-user-group { border-top: 1px solid var(--line); }
.export-user-head { padding: 8px 18px 4px; }
.export-user-head .export-ch-label { font-size: 12.5px; font-weight: 700; color: var(--accent-ink); }
.export-ugroup-head {
  display: flex; align-items: center; gap: 6px; padding: 5px 18px 5px 24px;
  font-size: 12px; font-weight: 600; color: var(--ink-soft);
}
.export-ugroup-name { flex: 1; }
/* export format segmented control */
.export-format { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.export-format-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); }
.export-seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: var(--panel-2); }
.export-seg-btn {
  font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer;
  border: 0; background: transparent; color: var(--ink-soft); padding: 6px 16px; transition: all .14s;
}
.export-seg-btn + .export-seg-btn { border-left: 1px solid var(--line); }
.export-seg-btn.on { background: var(--accent); color: #fff; }

/* =========================================================================
   MOBILE / RESPONSIVE  (shared by all four builds)
   Activated by JS (useIsMobile → .app.is-mobile) so the layout swaps even on a
   narrow desktop window. Styles below target only the mobile-only elements
   plus a few .is-mobile overrides of shared views.
   ========================================================================= */

/* three rows: slim topbar · stage · tab bar */
.app.is-mobile { grid-template-rows: auto 1fr auto; }
.app-main-mobile { grid-template-columns: 1fr; }

/* ---- mobile mini-segment in desktop Settings (layout switch) ----------- */
.settings-layout-row { cursor: default; }
.seg-mini { display: inline-flex; border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
.seg-mini-btn { font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; border: 0; background: transparent; color: var(--ink-soft); padding: 4px 11px; }
.seg-mini-btn + .seg-mini-btn { border-left: 1px solid var(--line); }
.seg-mini-btn.on { background: var(--accent); color: #fff; }

/* ---- slim mobile top bar ---------------------------------------------- */
.topbar-mobile {
  height: 54px; gap: 8px; padding: 0 10px;
  padding-top: env(safe-area-inset-top, 0);
}
.mtop-set {
  display: flex; align-items: center; gap: 7px; min-width: 0; max-width: 60%;
  background: none; border: 0; padding: 6px 6px; cursor: pointer; font: inherit; color: var(--ink);
}
.mtop-glyph { font-family: Georgia, 'Spectral', serif; color: var(--accent); font-size: 21px; line-height: 1; }
.mtop-set-name { font-weight: 600; font-size: 15.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mtop-caret { color: var(--muted); font-size: 10px; flex-shrink: 0; }
.mtop-nav { display: flex; align-items: center; gap: 5px; }
.mtop-arrow {
  width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line);
  background: var(--panel-2); color: var(--ink); font-size: 22px; line-height: 1; cursor: pointer;
  display: grid; place-items: center; -webkit-tap-highlight-color: transparent;
}
.mtop-arrow:active { background: var(--accent-soft); }
.mtop-arrow:disabled { opacity: 0.32; }
.mtop-score { font-size: 13px; font-weight: 700; color: var(--muted); min-width: 48px; text-align: center; font-variant-numeric: tabular-nums; }
.mtop-score.solo { min-width: 0; padding-right: 6px; }

/* ---- bottom tab bar ---------------------------------------------------- */
.mtabbar {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--line); background: var(--panel);
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 30;
}
.mtab {
  position: relative; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: 0; padding: 9px 4px 8px; cursor: pointer;
  color: var(--muted); font: inherit; -webkit-tap-highlight-color: transparent;
}
.mtab-ico { font-size: 19px; line-height: 1; font-family: 'Spectral', serif; }
.mtab-label { font-size: 11px; font-weight: 600; letter-spacing: 0.01em; }
.mtab.on { color: var(--accent-ink); }
.mtab:active { background: var(--hover); }
.mtab-badge {
  position: absolute; top: 4px; left: calc(50% + 6px);
  font-size: 9.5px; font-weight: 700; color: #fff; background: var(--accent);
  border-radius: 9px; padding: 1px 5px; min-width: 8px; text-align: center; line-height: 1.45;
}

/* ---- slide-up sheets --------------------------------------------------- */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 1400; background: oklch(0 0 0 / 0.42);
  display: flex; animation: sheet-fade 0.18s ease;
}
.sheet-back-bottom { align-items: flex-end; }
.sheet-back-left { justify-content: flex-start; }
.sheet-back-right { justify-content: flex-end; }
.sheet {
  background: var(--panel); display: flex; flex-direction: column;
  box-shadow: 0 -8px 44px oklch(0 0 0 / 0.28); max-height: 86vh; min-height: 0;
}
.sheet-bottom {
  width: 100%; border-radius: 20px 20px 0 0;
  padding-bottom: env(safe-area-inset-bottom, 0);
  animation: sheet-up 0.26s cubic-bezier(.22,.61,.36,1);
}
.sheet-list { height: 78vh; }
@keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes sheet-fade { from { opacity: 0; } to { opacity: 1; } }
.sheet-grip { display: grid; place-items: center; padding: 9px 0 2px; flex-shrink: 0; }
.sheet-grip span { width: 40px; height: 4px; border-radius: 4px; background: var(--line); }
.sheet-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px 11px; border-bottom: 1px solid var(--line-soft); flex-shrink: 0;
}
.sheet-title { font-size: 16.5px; font-weight: 600; color: var(--ink); }
.sheet-close {
  width: 34px; height: 34px; border-radius: 50%; border: 0; background: var(--panel-2);
  color: var(--muted); font-size: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; flex: 1; }
.sheet-body .col-scroll { overflow: visible; max-height: none; height: auto; }
.sheet-foot { padding: 11px 16px; border-top: 1px solid var(--line-soft); display: flex; justify-content: center; flex-shrink: 0; }
.sheet-foot-count { font-size: 12.5px; color: var(--muted); font-weight: 600; }
.sheet-foot .settings-stamp { margin: 0; padding: 0; border: 0; }

/* ---- More sheet -------------------------------------------------------- */
.msheet-actions { display: flex; gap: 10px; padding: 14px 16px 8px; }
.msheet-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px;
  padding: 14px 12px; border-radius: 13px; border: 1px solid var(--line);
  background: var(--panel-2); color: var(--ink); font: inherit; font-size: 14.5px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.msheet-btn:active { background: var(--accent-soft); border-color: var(--accent); }
.msheet-ico { font-size: 17px; }
.msheet-settings { padding: 8px 16px 4px; display: flex; flex-direction: column; gap: 2px; }
.msheet-settings .settings-row { padding: 11px 0; border-bottom: 1px solid var(--line-soft); }
.msheet-settings .settings-row:last-child { border-bottom: 0; }
.msheet-layout { margin: 6px 16px 18px; width: calc(100% - 32px); }

/* bigger touch targets for the behaviour toggles inside sheets */
.sheet .beh-toggle { width: 46px; height: 28px; }
.sheet .beh-toggle .beh-knob { width: 22px; height: 22px; }
.sheet .beh-toggle.on .beh-knob { transform: translateX(18px); }

/* ---- center stage on phones ------------------------------------------- */
.app.is-mobile .prob-head { padding: 12px 16px 4px; }
.app.is-mobile .prob-eyebrow { font-size: 11px; }
.app.is-mobile .prob-head-row { flex-wrap: wrap; gap: 8px 10px; align-items: center; }
.app.is-mobile .prob-title { font-size: 18px; flex: 1 1 100%; }
.app.is-mobile .prob-instr { font-size: 13.5px; }
.app.is-mobile .dock { padding-left: 14px; padding-right: 14px; }
.app.is-mobile .dock-tools { gap: 8px; }
.app.is-mobile .entry-row { flex-wrap: wrap; gap: 8px; }
.app.is-mobile .entry { flex: 1 1 100%; }
.app.is-mobile .entry-row .btn-primary { flex: 1 1 100%; padding: 13px; font-size: 15px; }
.app.is-mobile .entry input { font-size: 16px; padding: 12px 0; }  /* ≥16px stops iOS zoom-on-focus */
.app.is-mobile .entry .live { max-width: 40%; }

/* symbol palette: a real on-screen keyboard on phones */
.app.is-mobile .palette-tip { display: none; }
.app.is-mobile .palette { gap: 7px; width: 100%; }
.app.is-mobile .palette .grp { gap: 6px; flex: 1; }
.app.is-mobile .sym-key { flex: 1; min-width: 42px; height: 44px; font-size: 19px; }
.app.is-mobile .sym-key .hint { display: none; }
.app.is-mobile .palette .sep { display: none; }

/* the Ctrl-key reference card is meaningless without a hardware keyboard */
.app.is-mobile .lex-kbd-ref { display: none; }

/* ---- modals go (near) full-screen on phones --------------------------- */
.app.is-mobile .modal-backdrop { align-items: flex-end; place-items: stretch end; }
.app.is-mobile .modal {
  width: 100%; max-width: 100%; height: 90vh; max-height: 90vh;
  border-radius: 18px 18px 0 0; align-self: end;
  animation: sheet-up 0.26s cubic-bezier(.22,.61,.36,1);
}
.app.is-mobile .modal h3 { padding-top: 22px; }

/* keep the TweaksPanel from colliding with the tab bar */
.app.is-mobile ~ .tweaks-panel, .app.is-mobile .tweaks-panel { bottom: 70px; }


/* S4: editor save-to-server status */
.fe-srv-ok { color: var(--good); font-size: 12.5px; cursor: pointer; }
.fe-srv-err { color: var(--bad); font-size: 12.5px; cursor: pointer; max-width: 340px; }

/* W11 (S9): progress summary */
.sum-modal { max-width: 560px; }
.sum-table { width: 100%; border-collapse: collapse; margin: 14px 0 8px; }
.sum-table td { padding: 7px 8px; border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: middle; }
.sum-title { max-width: 260px; }
.sum-count { white-space: nowrap; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; text-align: right; }
.sum-bar { width: 34%; }
.sum-bar-track { height: 7px; border-radius: 99px; background: var(--panel-2); overflow: hidden; }
.sum-bar-fill { height: 100%; border-radius: 99px; background: var(--good); }
.sum-done .sum-title::after { content: ' ✓'; color: var(--good); }
.sum-grand td { font-weight: 600; border-bottom: none; padding-top: 10px; }
.sum-hint { font-size: 12.5px; color: var(--ink-soft); margin: 4px 0 12px; }
.sum-actions { display: flex; justify-content: flex-end; }

/* W11 (S9): phone interstitial */
.phone-gate { position: fixed; inset: 0; z-index: 400; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 24px; }
.phone-gate-card { max-width: 360px; text-align: center; }
.phone-gate-glyph { font-family: Georgia, serif; font-size: 54px; color: #b5532f; margin-bottom: 6px; }
.phone-gate-card h2 { margin: 0 0 12px; font-size: 22px; }
.phone-gate-card p { font-size: 14.5px; line-height: 1.55; color: var(--ink-soft); }
.phone-gate-btn { display: block; width: 100%; box-sizing: border-box; margin: 10px 0 0; padding: 12px; text-decoration: none; }
.phone-gate-continue { margin-top: 22px; font-size: 13px; color: var(--ink-soft); background: none; border: none; cursor: pointer; }

/* S10 (W15): hints + latex */
.hint-list { margin: 8px 0 4px; display: flex; flex-direction: column; gap: 6px; }
.hint-item { font-size: 13.5px; }

/* S11 (W16): scratchpad */
.scratch-modal { max-width: 640px; }
.scratch-lex-head { display: grid; grid-template-columns: 130px 1fr 90px 26px; gap: 8px; font-size: 11.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 4px; }
.scratch-lex { display: flex; flex-direction: column; gap: 6px; }
.scratch-row { display: grid; grid-template-columns: 130px 1fr 90px 26px; gap: 8px; align-items: center; }
.scratch-word, .scratch-den { padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; background: var(--bg); color: var(--ink); font: inherit; font-size: 13.5px; }
.scratch-type { font-size: 12px; font-family: 'IBM Plex Mono', monospace; color: var(--ink-soft); }
.scratch-add { margin: 8px 0 4px; }
.scratch-tree-head { margin: 14px 0 4px; font-weight: 600; font-size: 14px; }
.scratch-hint { font-weight: 400; font-size: 12px; color: var(--ink-soft); margin-left: 8px; }
.scratch-tree { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid var(--line); border-radius: 7px; background: var(--bg); color: var(--ink); font-size: 13.5px; resize: vertical; }
.scratch-status { margin-top: 6px; font-size: 13px; }
.scratch-status.ok { color: var(--good); }
.scratch-status.open { color: var(--ink-soft); }
.scratch-status.err { color: var(--bad); }
.scratch-actions { display: flex; gap: 8px; align-items: center; margin-top: 16px; }

/* S11 (W16): offline notice */
.net-notice { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 350; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 8px 18px; font-size: 13px; color: var(--ink-soft); box-shadow: 0 4px 18px rgba(0,0,0,.12); }

/* W14: hints authoring */
.fe-hints-det { flex-basis: 100%; }
.fe-hints-sum { font-size: 12px; color: var(--ink-soft); cursor: pointer; }
.fe-hints-ta { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; background: var(--bg); color: var(--ink); font-size: 12.5px; resize: vertical; }

/* ---- a11y (S13.5): keyboard + screen-reader access ---------------------- */
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}
.node-box:focus-visible, .rule-card:focus-visible, .shift-card:focus-visible,
.btn:focus-visible, .btn-ghost:focus-visible, .zoom-btn:focus-visible,
.sym-key:focus-visible, .entry input:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}


/* ===========================================================================
   lingdown.css — typesetting for the lingdown engine. Themable via --ld-*
   custom properties; defaults tuned to the COMPOSE parchment palette.
   =========================================================================== */
.ld-doc {
  --ld-ink:    var(--ink, oklch(0.285 0.022 52));
  --ld-soft:   var(--ink-soft, oklch(0.42 0.02 55));
  --ld-muted:  var(--muted, oklch(0.56 0.018 58));
  --ld-faint:  var(--faint, oklch(0.69 0.014 62));
  --ld-line:   var(--line, oklch(0.875 0.016 72));
  --ld-line-soft: var(--line-soft, oklch(0.915 0.012 74));
  --ld-panel:  var(--panel, oklch(0.985 0.008 82));
  --ld-panel2: var(--panel-2, oklch(0.972 0.011 80));
  --ld-accent: var(--accent, oklch(0.585 0.13 44));
  --ld-accent-ink: var(--accent-ink, oklch(0.46 0.13 42));
  --ld-good:   var(--good, oklch(0.55 0.1 150));
  --ld-mono: 'IBM Plex Mono', ui-monospace, monospace;
  color: var(--ld-ink);
  font-family: 'Spectral', Georgia, serif;
}
.ld-doc * { box-sizing: border-box; }

/* ---- prose ------------------------------------------------------------- */
.ld-h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin: 22px 0 8px; }
.ld-h2 { font-size: 15px; font-weight: 600; color: var(--ld-accent-ink); margin: 20px 0 7px; }
.ld-h3 { font-size: 13px; font-weight: 600; color: var(--ld-soft); margin: 16px 0 6px; }
.ld-doc > .ld-h1:first-child, .ld-doc > .ld-h2:first-child { margin-top: 0; }
.ld-p { font-size: 14.5px; line-height: 1.62; color: var(--ld-soft); margin: 0 0 11px; }
.ld-ul { margin: 0 0 12px; padding-left: 20px; }
.ld-ul li { font-size: 14px; line-height: 1.55; color: var(--ld-soft); margin-bottom: 4px; }
.ld-doc code { font-family: var(--ld-mono); font-size: 0.86em; background: var(--ld-panel2); border: 1px solid var(--ld-line-soft); border-radius: 4px; padding: 0 4px; color: var(--ld-ink); }
.ld-doc strong { color: var(--ld-ink); font-weight: 600; }
.ld-doc em { color: var(--ld-ink); }
.ld-math { font-family: var(--ld-mono); font-size: 0.92em; color: var(--ld-ink); white-space: nowrap; }
.ld-math sub, .ld-math sup, .ld-den sub, .ld-deriv sub { font-size: 0.72em; }
.ld-code { font-family: var(--ld-mono); font-size: 12px; background: var(--ld-panel2); border: 1px solid var(--ld-line-soft); border-radius: 8px; padding: 10px 12px; overflow: auto; }

/* ======================== TREE ========================================= */
.ld-tree { overflow: auto; padding: 4px 0 6px; margin: 6px 0 14px; }
.ld-forest { position: relative; display: inline-block; min-width: 100%; padding: 8px 14px 12px; }
.ld-edges { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
.ld-edges line { stroke: var(--ld-line); stroke-width: 1.4; }
.ld-edges .ld-roof { fill: none; stroke: var(--ld-line); stroke-width: 1.4; stroke-linejoin: round; }
.ld-node { display: flex; flex-direction: column; align-items: center; position: relative; }
.ld-children { display: flex; flex-direction: row; align-items: flex-start; gap: 24px; margin-top: 30px; }
.ld-box {
  position: relative; z-index: 1; white-space: nowrap;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  padding: 3px 9px; border-radius: 7px;
}
.ld-cat { font-family: 'Spectral', serif; font-style: italic; font-size: 14px; color: var(--ld-soft); font-weight: 500; }
.ld-den { font-family: var(--ld-mono); font-size: 11px; color: var(--ld-accent-ink); background: color-mix(in oklab, var(--ld-accent) 11%, transparent); border-radius: 5px; padding: 1px 6px; margin-top: 1px; }
.ld-box.ld-word {
  font-family: 'Spectral', serif; font-size: 14.5px; font-weight: 500; color: var(--ld-ink);
  background: var(--ld-panel); border: 1px solid var(--ld-line); box-shadow: 0 1px 2px oklch(0.4 0.03 60 / 0.07);
}

/* ======================== EXAMPLES ===================================== */
.ld-ex { margin: 10px 0 16px; }
.ld-ex-row { display: grid; grid-template-columns: 38px 20px 1fr; align-items: baseline; column-gap: 4px; padding: 2px 0; }
.ld-ex-row.sub { grid-template-columns: 38px 20px 1fr; padding-left: 28px; }
.ld-ex-num { font-family: var(--ld-mono); font-size: 12.5px; color: var(--ld-muted); }
.ld-ex-judge { font-family: var(--ld-mono); font-size: 13px; color: var(--ld-accent); font-weight: 600; text-align: center; }
.ld-ex-txt { font-size: 14.5px; line-height: 1.5; color: var(--ld-ink); }
.ld-ex-row { scroll-margin-top: 12px; border-radius: 6px; }

/* cross-references */
.ld-xref { color: var(--ld-accent-ink); font-weight: 600; cursor: pointer; border-bottom: 1px dotted color-mix(in oklab, var(--ld-accent) 55%, transparent); white-space: nowrap; }
.ld-xref:hover { background: color-mix(in oklab, var(--ld-accent) 12%, transparent); border-radius: 3px; }
/* flash when a ref target is jumped to */
@keyframes ld-flash-kf { 0% { background: color-mix(in oklab, var(--ld-accent) 26%, transparent); } 100% { background: transparent; } }
.ld-flash { animation: ld-flash-kf 1.3s ease-out; box-shadow: -8px 0 0 color-mix(in oklab, var(--ld-accent) 26%, transparent); }

/* ======================== GLOSS ======================================== */
.ld-gloss { margin: 10px 0 16px; }
.ld-gloss-grid { display: flex; flex-wrap: wrap; gap: 4px 16px; }
.ld-gloss-col { display: flex; flex-direction: column; gap: 2px; }
.ld-gloss-s { font-size: 14px; color: var(--ld-ink); font-style: italic; }
.ld-gloss-g { font-family: var(--ld-mono); font-size: 11.5px; color: var(--ld-soft); }
.ld-sc { font-variant: all-small-caps; letter-spacing: 0.02em; }
.ld-gloss-known { border-bottom: 1px dotted var(--ld-faint); cursor: help; }
.ld-gloss-t { font-size: 14px; color: var(--ld-soft); margin-top: 7px; }

/* ======================== DERIVATION =================================== */
.ld-deriv { font-family: var(--ld-mono); margin: 10px 0 16px; border-left: 2px solid var(--ld-line); padding-left: 14px; overflow-x: auto; }
.ld-deriv-row { display: grid; grid-template-columns: minmax(0, 1fr) max-content; align-items: baseline; column-gap: 24px; padding: 3px 0; font-size: 13px; }
.ld-deriv-e { color: var(--ld-ink); white-space: nowrap; }
.ld-deriv-t { color: var(--ld-muted); font-size: 12px; flex: 0 0 auto; }
.ld-deriv-t::before { content: ': '; color: var(--ld-faint); }
.ld-deriv-gap { height: 7px; }

/* ======================== FOOTNOTES ==================================== */
.ld-fn-ref { font-size: 0.7em; line-height: 0; }
.ld-fn-ref a { color: var(--ld-accent-ink); font-family: var(--ld-mono); font-weight: 600; cursor: pointer; padding: 0 1px; }
.ld-fn-ref a:hover { text-decoration: underline; }
.ld-footnotes { margin: 22px 0 4px; }
.ld-fn-rule { width: 38%; max-width: 160px; height: 1px; background: var(--ld-line); margin: 0 0 12px; }
.ld-fn { display: grid; grid-template-columns: 20px 1fr; gap: 8px; align-items: baseline; margin-bottom: 7px; scroll-margin-top: 12px; }
.ld-fn-n { font-family: var(--ld-mono); font-size: 11px; color: var(--ld-accent-ink); font-weight: 600; text-align: right; }
.ld-fn-b { font-size: 12.5px; line-height: 1.5; color: var(--ld-soft); }
.ld-fn-back { color: var(--ld-faint); text-decoration: none; cursor: pointer; margin-left: 3px; }
.ld-fn-back:hover { color: var(--ld-accent-ink); }

/* ======================== AVM ========================================== */
.ld-avm-wrap { margin: 10px 0 16px; }
.ld-avm {
  display: inline-flex; flex-direction: column; gap: 3px; position: relative;
  padding: 7px 12px; margin: 1px 0;
}
.ld-avm::before, .ld-avm::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 6px;
  border: 1.4px solid var(--ld-soft);
}
.ld-avm::before { left: 0; border-right: 0; }
.ld-avm::after { right: 0; border-left: 0; }
.ld-avm-row { display: grid; grid-template-columns: max-content 1fr; align-items: baseline; gap: 16px; }
.ld-avm-attr { font-family: var(--ld-mono); font-size: 11.5px; letter-spacing: 0.03em; color: var(--ld-accent-ink); font-variant: all-small-caps; }
.ld-avm-val { font-family: var(--ld-mono); font-size: 12.5px; color: var(--ld-ink); }
.ld-avm-val .ld-avm { padding-top: 2px; padding-bottom: 2px; }

/* S10 (W15): derivation deep links */
.ld-deriv-link { color: #b5532f; text-decoration: none; border-bottom: 1px dashed #b5532f; cursor: pointer; }
.ld-deriv-link:hover { border-bottom-style: solid; }

/* ---- S14: LaTeX input additions ---- */
.ld-math-display { display: block; text-align: center; margin: 14px 0; white-space: normal; font-size: 1.02em; }
.ld-ipa { font-family: var(--ld-mono); }


/* ===========================================================================
   reading-editor.css — COMPOSE Reading-companion editor (instructor tool).
   Layers on top of themes.css; reuses .modal-backdrop / .btn-ghost etc.
   =========================================================================== */
.re-backdrop { z-index: 1200; }            /* sit above the exercise editor modal */
.re-modal {
  width: min(1180px, 96vw); height: min(88vh, 860px);
  display: flex; flex-direction: column; padding: 0; overflow: hidden;
}

/* header */
.re-head {
  flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  background: color-mix(in oklab, var(--panel) 88%, transparent);
}
.re-head .re-ttl { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.re-head .re-ttl .ico { color: var(--accent); font-size: 17px; }
.re-head .re-sub { font-size: 12px; color: var(--muted); font-style: italic; }
.re-head .sp { flex: 1; }
.re-head .re-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

/* body: editor | preview */
.re-body { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; }
.re-pane { min-width: 0; min-height: 0; display: flex; flex-direction: column; }
.re-pane.left { border-right: 1px solid var(--line); }
.re-pane-head {
  flex: 0 0 auto; display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  font-weight: 600; border-bottom: 1px solid var(--line-soft);
}
.re-pane-head .sp { flex: 1; }

/* insert toolbar */
.re-tools { display: flex; gap: 5px; flex-wrap: wrap; padding: 8px 12px; border-bottom: 1px solid var(--line-soft); background: var(--panel-2); }
.re-tool {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft);
  background: var(--panel); border: 1px solid var(--line); border-radius: 7px;
  padding: 4px 9px; cursor: pointer;
}
.re-tool:hover { border-color: var(--accent); color: var(--accent-ink); }

/* textarea */
.re-ta {
  flex: 1; min-height: 0; width: 100%; resize: none; border: 0; outline: none;
  font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; line-height: 1.62;
  padding: 14px 16px; background: var(--panel); color: var(--ink-soft);
}

/* preview */
.re-preview { flex: 1; min-height: 0; overflow: auto; padding: 18px 20px; background: var(--paper, var(--panel)); }
.re-empty { color: var(--faint); font-style: italic; font-size: 13px; padding: 8px; }

/* sections strip */
.re-sections { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 8px 14px; border-top: 1px solid var(--line-soft); background: var(--panel); }
.re-sec-label { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.re-sec-chip { font-size: 11.5px; color: var(--accent-ink); background: var(--accent-soft); border-radius: 999px; padding: 3px 10px; }
.re-sec-chip .k { font-family: 'IBM Plex Mono', monospace; font-weight: 600; margin-right: 5px; }
.re-sec-none { font-size: 11.5px; color: var(--faint); font-style: italic; }

/* guide */
.re-guide { padding: 0 14px 12px; }
.re-guide details { border: 1px solid var(--line); border-radius: 9px; background: var(--panel); overflow: hidden; }
.re-guide summary { cursor: pointer; padding: 9px 12px; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); list-style: none; display: flex; align-items: center; gap: 8px; }
.re-guide summary::-webkit-details-marker { display: none; }
.re-guide summary .gi { color: var(--accent); }
.re-guide .gbody { padding: 4px 14px 14px; font-size: 12.5px; line-height: 1.6; color: var(--ink-soft); }
.re-guide .gbody code { font-family: 'IBM Plex Mono', monospace; font-size: 0.92em; background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 4px; padding: 0 4px; }
.re-guide .gbody pre { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 8px; padding: 10px 12px; overflow: auto; margin: 8px 0; line-height: 1.55; }
.re-guide .gbody b { color: var(--ink); }

/* footer */
.re-foot { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--line); background: var(--panel); }
.re-foot .hint { font-size: 12px; color: var(--muted); font-style: italic; }

/* a small dot indicating a reading is attached, used on the editor button */
.fe-reading-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; margin-left: 5px; }

/* ====================== AUTOGEN PREVIEW ================================= */
.re-ag-backdrop { z-index: 1300; }
.re-ag {
  width: min(720px, 94vw); max-height: 86vh; display: flex; flex-direction: column;
  padding: 0; overflow: hidden;
}
.re-ag-head { flex: 0 0 auto; padding: 14px 18px; border-bottom: 1px solid var(--line); }
.re-ag-head h3 { margin: 0 0 3px; font-size: 16px; font-weight: 600; }
.re-ag-head p { margin: 0; font-size: 12.5px; color: var(--muted); }
.re-ag-body { flex: 1; min-height: 0; overflow: auto; padding: 14px 18px; }
.re-ag-sec { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin: 14px 0 7px; }
.re-ag-sec:first-child { margin-top: 0; }
.re-ag-lex { display: flex; flex-wrap: wrap; gap: 6px; }
.re-ag-lex .row { display: inline-flex; align-items: baseline; gap: 7px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 7px; padding: 3px 9px; }
.re-ag-lex .w { color: var(--ink); font-weight: 600; }
.re-ag-lex .d { color: var(--ink-soft); }
.re-ag-group { border: 1px solid var(--line); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.re-ag-group-hdr { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--panel-2); border-bottom: 1px solid var(--line-soft); }
.re-ag-group-hdr .t { font-weight: 600; font-size: 13px; }
.re-ag-group-hdr .sec { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent-ink); background: var(--accent-soft); border-radius: 999px; padding: 2px 8px; }
.re-ag-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-top: 1px solid var(--line-soft); }
.re-ag-item:first-child { border-top: 0; }
.re-ag-item .s { flex: 1; min-width: 0; font-size: 13px; color: var(--ink); }
.re-ag-item .tree { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
.re-badge { font-size: 11px; font-weight: 600; border-radius: 999px; padding: 2px 9px; white-space: nowrap; }
.re-badge.ok { color: var(--good); background: var(--good-soft, color-mix(in oklab, var(--good) 16%, transparent)); }
.re-badge.warn { color: var(--accent-ink); background: var(--accent-soft); }
.re-badge.err { color: var(--bad, oklch(0.55 0.16 26)); background: color-mix(in oklab, oklch(0.55 0.16 26) 14%, transparent); }
.re-ag-foot { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-top: 1px solid var(--line); }
.re-ag-foot .warnnote { font-size: 12px; color: var(--muted); flex: 1; }
.re-ag-empty { font-size: 13px; color: var(--muted); font-style: italic; padding: 10px 0; }

/* per-exercise section select in the exercises panel */
.fe-sec-field { display: inline-flex; align-items: center; gap: 5px; }
.fe-sec-field .lab { font-size: 10.5px; color: var(--muted); }
.fe-sec-sel { font-family: 'IBM Plex Mono', monospace; font-size: 11px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); color: var(--ink-soft); padding: 2px 5px; max-width: 140px; }

/* ===========================================================================
   reader.jsx — docked Reading panel (Direction C), replaces the PDF loader.
   =========================================================================== */
/* right-column tab header (Lexicon | Reading) */
.panel-head.rd-tabhead { padding: 0; display: flex; align-items: stretch; gap: 0; }
.rd-tab { flex: 0 0 auto; background: transparent; border: 0; border-bottom: 2px solid transparent; padding: 12px 15px; font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); font-weight: 600; cursor: pointer; }
.rd-tab:hover { color: var(--ink-soft); }
.rd-tab.on { color: var(--ink); border-bottom-color: var(--accent); }
.rd-tab .count { color: var(--faint); margin-left: 2px; }

/* embedded reader (fills the right column) + mobile overlay panel */
.rd-embed { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.app.is-mobile .rd-panel { position: fixed; inset: 0; z-index: 1400; display: flex; flex-direction: column; background: var(--panel); }
.rd-panel { --rd-hl-y: oklch(0.9 0.085 92); --rd-hl-g: oklch(0.9 0.07 150); --rd-hl-b: oklch(0.9 0.06 240); }
.rd-embed { --rd-hl-y: oklch(0.9 0.085 92); --rd-hl-g: oklch(0.9 0.07 150); --rd-hl-b: oklch(0.9 0.06 240); }

.rd-head { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--line); }
.rd-bk { display: flex; flex-direction: column; min-width: 0; flex: 1; }
.rd-bk-t { font-size: 13.5px; font-weight: 600; }
.rd-bk-s { font-size: 11px; color: var(--muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rd-x { width: 30px; height: 30px; flex: 0 0 auto; border: 1px solid var(--line); border-radius: 7px; background: var(--panel); color: var(--ink-soft); cursor: pointer; font-size: 14px; }

/* collapsible blocks (Contents, Saved) */
.rd-block { flex: 0 0 auto; border-bottom: 1px solid var(--line-soft); }
.rd-block-saved { border-bottom: 0; border-top: 1px solid var(--line); }
.rd-block-bar { width: 100%; display: flex; align-items: center; gap: 8px; padding: 9px 13px; background: transparent; border: 0; cursor: pointer; text-align: left; }
.rd-block-bar:hover { background: var(--panel-2); }
.rd-block-name { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.rd-synced { font-size: 10px; color: var(--accent-ink); background: var(--accent-soft); border-radius: 999px; padding: 2px 7px; font-family: 'IBM Plex Mono', monospace; }
.rd-count2 { font-size: 10.5px; color: var(--faint); font-family: 'IBM Plex Mono', monospace; }
.rd-caret { font-size: 10px; color: var(--faint); }

.rd-toc { max-height: 30vh; overflow: auto; padding: 4px 6px 8px; }
.rd-toc-item { display: flex; align-items: baseline; gap: 8px; padding: 6px 8px; border-radius: 7px; cursor: pointer; }
.rd-toc-item:hover { background: var(--panel-2); }
.rd-toc-item.active { background: var(--accent-soft); }
.rd-toc-no { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--faint); flex: 0 0 auto; }
.rd-toc-item.active .rd-toc-no { color: var(--accent-ink); }
.rd-toc-t { font-size: 12.5px; color: var(--ink-soft); line-height: 1.3; }
.rd-toc-item.active .rd-toc-t { color: var(--ink); font-weight: 600; }
.rd-empty-s { font-size: 11.5px; color: var(--faint); font-style: italic; padding: 8px; line-height: 1.4; }

.rd-readwrap { flex: 1; min-height: 0; display: flex; }
.rd-scroll { flex: 1; min-height: 0; overflow: auto; padding: 14px 15px 26px; position: relative; }
.rd-doc-host { position: relative; }
.rd-empty { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.5; padding: 8px; }

.rd-saved-list { max-height: 28vh; overflow: auto; padding: 4px 9px 12px; display: flex; flex-direction: column; gap: 6px; }
.rd-saved-item { display: flex; gap: 7px; align-items: stretch; }
.rd-saved-bar { width: 4px; border-radius: 2px; flex: 0 0 auto; }
.rd-saved-body { flex: 1; min-width: 0; cursor: pointer; }
.rd-saved-q { font-size: 11.5px; color: var(--ink-soft); line-height: 1.35; }
.rd-saved-note { font-size: 11px; color: var(--accent-ink); font-style: italic; margin-top: 2px; line-height: 1.3; }
.rd-saved-acts { display: flex; flex-direction: column; gap: 2px; flex: 0 0 auto; }
.rd-saved-acts button { width: 18px; height: 18px; border: 0; background: transparent; color: var(--faint); cursor: pointer; border-radius: 4px; font-size: 11px; line-height: 1; }
.rd-saved-acts button:hover { background: var(--panel-2); color: var(--accent-ink); }

/* user highlights */
.ld-userhl { border-radius: 3px; padding: 0 1px; box-shadow: 0 0 0 1px color-mix(in oklab, var(--ink) 8%, transparent) inset; cursor: pointer; }

/* selection popover */
.rd-selpop { position: absolute; transform: translate(-50%, calc(-100% - 9px)); display: flex; align-items: center; gap: 3px; padding: 4px; background: var(--ink); border-radius: 9px; box-shadow: 0 8px 26px oklch(0.3 0.03 60 / 0.3); z-index: 8; }
.rd-selpop::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 9px; height: 9px; background: var(--ink); }
.rd-sw { width: 20px; height: 20px; border: 1px solid oklch(1 0 0 / 0.25); border-radius: 5px; cursor: pointer; padding: 0; }
.rd-sw:hover { transform: scale(1.08); }
.rd-note-btn { width: 24px; height: 22px; border: 0; background: transparent; color: oklch(0.95 0.01 80); border-radius: 5px; cursor: pointer; font-size: 12px; }
.rd-note-btn:hover { background: oklch(1 0 0 / 0.14); }

/* note composer */
.rd-note-overlay { position: fixed; inset: 0; background: oklch(0.3 0.02 60 / 0.28); display: grid; place-items: center; z-index: 1500; }
.rd-note-card { width: 86%; max-width: 340px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 14px 44px oklch(0.3 0.03 60 / 0.3); padding: 14px; }
.rd-note-h { font-size: 12px; font-weight: 600; color: var(--accent-ink); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 9px; }
.rd-note-ta { width: 100%; min-height: 88px; resize: vertical; border: 1px solid var(--line); border-radius: 8px; background: var(--panel-2); padding: 9px 11px; font-family: 'Spectral', Georgia, serif; font-size: 13.5px; line-height: 1.5; color: var(--ink); outline: none; }
.rd-note-ta:focus { border-color: var(--accent); }
.rd-note-foot { display: flex; align-items: center; gap: 8px; margin-top: 11px; }
